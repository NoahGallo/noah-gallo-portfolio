<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Primary SEO -->
    <title>Noah Gallo — Cloud & DevOps Engineer</title>
    <meta
      name="description"
      content="Noah Gallo — Cloud & DevOps Engineer specializing in Azure, AWS, Kubernetes, and Infrastructure as Code. Luxembourg-based, certified across the Microsoft Azure expert track."
    />
    <meta
      name="keywords"
      content="Noah Gallo, Cloud Engineer, DevOps Engineer, Azure, AWS, GCP, Kubernetes, Terraform, Luxembourg, Infrastructure as Code, CI/CD"
    />
    <meta name="author" content="Noah Gallo" />
    <link rel="canonical" href="https://www.noah-gallo.com/" />

    <!-- Open Graph (LinkedIn, WhatsApp, Slack, Discord, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.noah-gallo.com/" />
    <meta property="og:title" content="Noah Gallo — Cloud & DevOps Engineer" />
    <meta
      property="og:description"
      content="Portfolio of Noah Gallo — Cloud & DevOps Engineer specializing in Azure, AWS, Kubernetes, and Infrastructure as Code."
    />
    <meta property="og:image" content="https://www.noah-gallo.com/images/noah-website-pic.jpg" />
    <meta property="og:image:alt" content="Profile photo of Noah Gallo" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Noah Gallo — Cloud & DevOps Engineer" />
    <meta
      name="twitter:description"
      content="Portfolio of Noah Gallo — Cloud & DevOps Engineer specializing in Azure, AWS, Kubernetes, and Infrastructure as Code."
    />
    <meta name="twitter:image" content="https://www.noah-gallo.com/images/noah-website-pic.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />

    <!-- Performance: preload the only above-the-fold image so it paints fast -->
    <link rel="preload" as="image" href="/images/noah-website-pic.jpg" fetchpriority="high" />

    <!-- Structured data: identifies Noah as a person to search engines.
         This is what powers rich knowledge-panel results on Google. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Noah Gallo",
        "jobTitle": "Cloud & DevOps Engineer",
        "url": "https://www.noah-gallo.com/",
        "image": "https://www.noah-gallo.com/images/noah-website-pic.jpg",
        "email": "mailto:gallo.noah@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Mersch",
          "addressCountry": "LU"
        },
        "sameAs": [
          "https://github.com/NoahGallo",
          "https://linkedin.com/in/noahgallo"
        ],
        "knowsAbout": [
          "Microsoft Azure",
          "Amazon Web Services",
          "Google Cloud Platform",
          "Kubernetes",
          "Terraform",
          "DevOps",
          "Infrastructure as Code",
          "CI/CD"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
